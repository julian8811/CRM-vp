<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/stitch/logo.svg" />
    <link rel="apple-touch-icon" href="/assets/stitch/logo.svg" />
    <meta name="theme-color" content="#031427" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CRM-VP — Enterprise Hub</title>
    <script>
      (function () {
        var theme = localStorage.getItem('theme') || 'dark';
        var root = document.documentElement;
        if (theme === 'dark') root.classList.add('dark');
        else root.classList.remove('dark');
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', theme === 'dark' ? '#031427' : '#f1f5f9');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
